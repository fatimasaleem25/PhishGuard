<!DOCTYPE html>
<html>
<head>
<title>PhishGuard — Phishing Email Detector</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;
  padding: 20px;
  max-width: 900px;
  margin: 0 auto;
}

h2 { margin-top: 0; }
h2 span { color: #38bdf8; }

input, textarea {
  width: 100%;
  background: #1e293b;
  color: white;
  border: 1px solid #334155;
  border-radius: 4px;
  padding: 8px;
  font-family: Arial, sans-serif;
  font-size: 13px;
  margin-bottom: 8px;
  box-sizing: border-box;
}
textarea { height: 120px; resize: vertical; }
label { font-size: 12px; color: #94a3b8; display: block; margin-top: 6px; }

button {
  background: #38bdf8;
  color: #0f172a;
  border: none;
  padding: 8px 18px;
  border-radius: 4px;
  font-weight: bold;
  cursor: pointer;
  margin-right: 6px;
}
button.secondary { background: #334155; color: white; }

.box {
  border: 1px solid #334155;
  background: #1e293b;
  border-radius: 6px;
  margin-top: 14px;
  padding: 14px;
}

.risk {
  padding: 12px;
  border-radius: 4px;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
}
.risk-HIGH   { background: rgba(239,68,68,0.15);  color: #fecaca; border: 1px solid #ef4444; }
.risk-MEDIUM { background: rgba(245,158,11,0.15); color: #fde68a; border: 1px solid #f59e0b; }
.risk-LOW    { background: rgba(34,197,94,0.15);  color: #bbf7d0; border: 1px solid #22c55e; }

.meta { display: flex; gap: 10px; margin-bottom: 10px; }
.meta div {
  flex: 1; background: #0f172a; padding: 8px; border-radius: 4px;
  text-align: center; font-size: 12px;
}
.meta b { display: block; font-size: 16px; color: #38bdf8; margin-top: 2px; }

.indicators { list-style: none; padding: 0; margin: 0; }
.indicators li {
  background: #0f172a; border-left: 3px solid #38bdf8;
  padding: 8px 10px; margin-bottom: 4px; font-size: 13px;
}

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px; text-align: left; border-bottom: 1px solid #334155; }
th { color: #94a3b8; font-weight: normal; font-size: 11px; text-transform: uppercase; }
.pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
.pill-phishing   { background: rgba(239,68,68,0.2); color: #fecaca; }
.pill-suspicious { background: rgba(245,158,11,0.2); color: #fde68a; }
.pill-legitimate { background: rgba(34,197,94,0.2); color: #bbf7d0; }
</style>
</head>

<body>

<h2>Phish<span>Guard</span> — Phishing Email Detector</h2>
<p style="color:#94a3b8; font-size:13px;">
  CSCI 401 · John Jay Seniors · paste an email below to scan it against our ML model
  (falls back to MITRE ATT&amp;CK T1566 rules).
</p>

<div class="box">
  <label>Sender</label>
  <input id="sender" placeholder="e.g., support@paypa1-secure.net">

  <label>Subject</label>
  <input id="subject" placeholder="e.g., URGENT: verify your account">

  <label>Body</label>
  <textarea id="body" placeholder="Paste the email body here..."></textarea>

  <button onclick="checkEmail()">Analyze</button>
  <button class="secondary" onclick="loadPhish()">Load Phishing Sample</button>
  <button class="secondary" onclick="loadLegit()">Load Legit Sample</button>
  <button class="secondary" onclick="clearForm()">Clear</button>
</div>

<div class="box" id="resultBox" style="display:none;">
  <h3 style="margin-top:0;">Result</h3>
  <div id="result"></div>
</div>

<div class="box">
  <h3 style="margin-top:0;">Scan Summary</h3>
  <canvas id="chart" height="80"></canvas>
</div>

<div class="box">
  <h3 style="margin-top:0;">History</h3>
  <table>
    <thead><tr>
      <th>ID</th><th>Sender</th><th>Subject</th>
      <th>Label</th><th>Confidence</th><th>When</th>
    </tr></thead>
    <tbody id="history"><tr><td colspan="6" style="color:#94a3b8;">No scans yet.</td></tr></tbody>
  </table>
</div>

<script>
const API = "http://127.0.0.1:5000";

// --- Chart.js bar chart (Muhammad's original, extended to 3 buckets) ---
const chart = new Chart(document.getElementById("chart"), {
  type: "bar",
  data: {
    labels: ["Phishing", "Suspicious", "Legitimate"],
    datasets: [{
      data: [0, 0, 0],
      backgroundColor: ["#ef4444", "#f59e0b", "#22c55e"]
    }]
  },
  options: {
    plugins: { legend: { display: false } },
    scales: { y: { ticks: { color: "#94a3b8" }, beginAtZero: true },
              x: { ticks: { color: "#94a3b8" } } }
  }
});

// --- Sample loaders ---
function loadPhish() {
  document.getElementById("sender").value  = "support@paypa1-secure.net";
  document.getElementById("subject").value = "URGENT: Your PayPal account has been suspended";
  document.getElementById("body").value    =
    "Dear customer, your account has been suspended due to unusual activity. " +
    "You must verify your account immediately or it will be permanently closed. " +
    "Click here to confirm your identity: http://192.168.1.45/paypal-login " +
    "Please enter your password and credit card number to restore access.";
}
function loadLegit() {
  document.getElementById("sender").value  = "no-reply@amazon.com";
  document.getElementById("subject").value = "Your order has shipped!";
  document.getElementById("body").value    =
    "Hi there, your order #113-4592011 has shipped. " +
    "Expected delivery: next Tuesday. Track at amazon.com/orders.";
}
function clearForm() {
  ["sender","subject","body"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("resultBox").style.display = "none";
}

// --- Analyze call ---
function checkEmail() {
  const sender  = document.getElementById("sender").value;
  const subject = document.getElementById("subject").value;
  const body    = document.getElementById("body").value;

  fetch(API + "/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sender, subject, body })
  })
  .then(r => r.json())
  .then(data => {
    renderResult(data);
    loadStats();
    loadHistory();
  })
  .catch(err => {
    document.getElementById("resultBox").style.display = "block";
    document.getElementById("result").innerHTML =
      "<p style='color:#ef4444'>Error contacting backend: " + err.message + "</p>";
  });
}

function renderResult(r) {
  const indicators = (r.indicators || []).map(i => {
    const text = (typeof i === "string") ? i : `[${i.type}] ${i.detail}`;
    return `<li>${escapeHtml(text)}</li>`;
  }).join("");

  document.getElementById("resultBox").style.display = "block";
  document.getElementById("result").innerHTML = `
    <div class="risk risk-${r.risk_level}">
      ${r.risk_level} RISK — ${r.classification.toUpperCase()}
    </div>
    <div class="meta">
      <div>Score<b>${r.score}</b></div>
      <div>Confidence<b>${(r.confidence*100).toFixed(0)}%</b></div>
      <div>Detector<b style="font-size:13px;">${r.detector}</b></div>
      <div>Email ID<b>#${r.email_id}</b></div>
    </div>
    <ul class="indicators">${indicators || "<li>No indicators flagged.</li>"}</ul>
  `;
}

// --- Stats chart ---
function loadStats() {
  fetch(API + "/stats")
    .then(r => r.json())
    .then(s => {
      chart.data.datasets[0].data = [s.phishing, s.suspicious, s.legitimate];
      chart.update();
    });
}

// --- History table ---
function loadHistory() {
  fetch(API + "/history?limit=25")
    .then(r => r.json())
    .then(rows => {
      const tbody = document.getElementById("history");
      if (!rows.length) {
        tbody.innerHTML = "<tr><td colspan='6' style='color:#94a3b8;'>No scans yet.</td></tr>";
        return;
      }
      tbody.innerHTML = rows.map(row => `
        <tr>
          <td>#${row.id}</td>
          <td>${escapeHtml(row.sender || "")}</td>
          <td>${escapeHtml(row.subject || "")}</td>
          <td><span class="pill pill-${row.label}">${row.label || ""}</span></td>
          <td>${row.confidence ? (row.confidence*100).toFixed(0)+"%" : ""}</td>
          <td style="color:#94a3b8; font-size:12px;">${(row.timestamp||"").slice(0,19)}</td>
        </tr>
      `).join("");
    });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// --- Boot ---
loadStats();
loadHistory();
</script>

</body>
</html>
